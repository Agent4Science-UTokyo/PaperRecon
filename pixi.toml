[workspace]
channels = ["conda-forge"]
name = "ai-writing"
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "==3.13"
tectonic = ">=0.15.0,<0.16"
poppler = ">=25.12.0,<26"
chktex = ">=1.7.9,<2"
numpy = ">=2.4.2,<3"
anthropic = ">=0.77.1,<0.78"
openai = ">=2.16.0,<3"
pypdf = ">=6.6.2,<7"
rich = ">=14.3.2,<15"
backoff = ">=2.2.1,<3"
pillow = ">=12.1.0,<13"
ruff = ">=0.15.0,<0.16"
pyright = ">=1.1.408,<2"
psutil = ">=7.2.2,<8"
tiktoken = ">=0.12.0,<0.13"
fastuuid = ">=0.14.0,<0.15"
texsoup = ">=0.3.1,<0.4"
fsspec = ">=2023.1.0,<=2025.3.0"

[pypi-dependencies]
datasets = ">=3.5.0, <4"
pymupdf = ">=1.26.7, <2"
pymupdf4llm = ">=0.2.9, <0.3"
litellm = ">=1.81.8, <2"
claude-agent-sdk = ">=0.1.48, <0.2"
